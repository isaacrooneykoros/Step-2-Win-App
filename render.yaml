services:
  - type: web
    name: step2win-backend
    env: python
    rootDir: backend
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: USE_REDIS
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: APP_SIGNING_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_ADMIN_URL
        value: admin-s2w-secure/
      - key: ADMIN_REGISTRATION_CODE
        sync: false
      - key: POCHIPAY_EMAIL
        sync: false
      - key: POCHIPAY_PASSWORD
        sync: false
      - key: POCHIPAY_WEBHOOK_SECRET
        sync: false
      - key: POCHIPAY_DEPOSIT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_PAYOUT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_WITHDRAWAL_CALLBACK_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: step2win-celery-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: USE_REDIS
        value: "True"
      - key: SECRET_KEY
        sync: false
      - key: APP_SIGNING_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_ADMIN_URL
        value: admin-s2w-secure/
      - key: ADMIN_REGISTRATION_CODE
        sync: false
      - key: POCHIPAY_EMAIL
        sync: false
      - key: POCHIPAY_PASSWORD
        sync: false
      - key: POCHIPAY_WEBHOOK_SECRET
        sync: false
      - key: POCHIPAY_DEPOSIT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_PAYOUT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_WITHDRAWAL_CALLBACK_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: step2win-celery-beat
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-beat.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: USE_REDIS
        value: "True"
      - key: SECRET_KEY
        sync: false
      - key: APP_SIGNING_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_ADMIN_URL
        value: admin-s2w-secure/
      - key: ADMIN_REGISTRATION_CODE
        sync: false
      - key: POCHIPAY_EMAIL
        sync: false
      - key: POCHIPAY_PASSWORD
        sync: false
      - key: POCHIPAY_WEBHOOK_SECRET
        sync: false
      - key: POCHIPAY_DEPOSIT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_PAYOUT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_WITHDRAWAL_CALLBACK_URL
        sync: false
      - key: SENTRY_DSN
        sync: false