# ---------------------------------------------------------------------------
# Managed databases (free tier)
# ---------------------------------------------------------------------------
databases:
  - name: step2win-db
    plan: free           # 90-day free trial on Render; upgrade to starter ($7/mo) after
    ipAllowList: []      # Allow connections from Render's internal network

# ---------------------------------------------------------------------------
# Managed Redis (free tier)
# ---------------------------------------------------------------------------
  - type: redis
    name: step2win-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

# ---------------------------------------------------------------------------
# Application services
# ---------------------------------------------------------------------------
services:
  # ── Web / API ──────────────────────────────────────────────────────────────
  - type: web
    name: step2win-backend
    env: python
    plan: free           # Free tier: web service sleeps after 15 min of inactivity
    rootDir: backend
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: USE_REDIS
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: APP_SIGNING_SECRET
        generateValue: true
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: INTASEND_WEBHOOK_SECRET
        sync: false
      - key: TRUSTED_PROXY_IPS
        sync: false
      # Auto-wired from managed services above — no manual copy-paste needed
      - key: DATABASE_URL
        fromDatabase:
          name: step2win-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: step2win-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: step2win-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: ALLOWED_HOSTS
        value: .onrender.com  # Safe default for Render hostnames; override with custom domains if needed.
      - key: CSRF_TRUSTED_ORIGINS
        sync: false       # e.g. https://step2win-backend.onrender.com,https://step-2-win-app.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false       # Must include mobile app origins: https://localhost,capacitor://localhost
                          # and any web frontend origins, e.g. https://step-2-win-app.vercel.app
      - key: DJANGO_ADMIN_URL
        generateValue: true
      - key: ENABLE_DEFENDER
        value: "True"
      - key: ADMIN_REGISTRATION_CODE
        sync: false
      - key: POCHIPAY_EMAIL
        sync: false
      - key: POCHIPAY_PASSWORD
        sync: false
      - key: POCHIPAY_WEBHOOK_SECRET
        sync: false
      - key: POCHIPAY_DEPOSIT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_PAYOUT_CALLBACK_URL
        sync: false
      - key: POCHIPAY_WITHDRAWAL_CALLBACK_URL
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Celery worker (requires paid Starter plan ~$7/mo on Render) ───────────
  # Background task processing: fraud scan, challenge finalization, etc.
  - type: worker
    name: step2win-celery-worker
    env: python
    plan: starter        # Workers are not available on the free plan
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-worker.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: USE_REDIS
        value: "True"
      - key: SECRET_KEY
        fromService:
          name: step2win-backend
          type: web
          envVarKey: SECRET_KEY
      - key: APP_SIGNING_SECRET
        fromService:
          name: step2win-backend
          type: web
          envVarKey: APP_SIGNING_SECRET
      - key: JWT_SIGNING_KEY
        fromService:
          name: step2win-backend
          type: web
          envVarKey: JWT_SIGNING_KEY
      - key: INTASEND_WEBHOOK_SECRET
        fromService:
          name: step2win-backend
          type: web
          envVarKey: INTASEND_WEBHOOK_SECRET
      - key: DATABASE_URL
        fromDatabase:
          name: step2win-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: step2win-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: step2win-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: ALLOWED_HOSTS
        fromService:
          name: step2win-backend
          type: web
          envVarKey: ALLOWED_HOSTS
      - key: DJANGO_ADMIN_URL
        fromService:
          name: step2win-backend
          type: web
          envVarKey: DJANGO_ADMIN_URL
      - key: ENABLE_DEFENDER
        value: "True"
      - key: POCHIPAY_EMAIL
        sync: false
      - key: POCHIPAY_PASSWORD
        sync: false
      - key: POCHIPAY_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Celery beat scheduler(requires paid Starter plan ~$7/mo on Render) ───
  - type: worker
    name: step2win-celery-beat
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-beat.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: USE_REDIS
        value: "True"
      - key: SECRET_KEY
        fromService:
          name: step2win-backend
          type: web
          envVarKey: SECRET_KEY
      - key: APP_SIGNING_SECRET
        fromService:
          name: step2win-backend
          type: web
          envVarKey: APP_SIGNING_SECRET
      - key: JWT_SIGNING_KEY
        fromService:
          name: step2win-backend
          type: web
          envVarKey: JWT_SIGNING_KEY
      - key: INTASEND_WEBHOOK_SECRET
        fromService:
          name: step2win-backend
          type: web
          envVarKey: INTASEND_WEBHOOK_SECRET
      - key: DATABASE_URL
        fromDatabase:
          name: step2win-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: step2win-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: step2win-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: ALLOWED_HOSTS
        fromService:
          name: step2win-backend
          type: web
          envVarKey: ALLOWED_HOSTS
      - key: DJANGO_ADMIN_URL
        fromService:
          name: step2win-backend
          type: web
          envVarKey: DJANGO_ADMIN_URL
      - key: ENABLE_DEFENDER
        value: "True"
      - key: SENTRY_DSN
        sync: false