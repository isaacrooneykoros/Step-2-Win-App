name: Deploy to Render

# Triggers automatically on every push to main that touches backend code.
# Render also has native GitHub auto-deploy; this workflow exists as an
# explicit, logged record of each deployment and lets you add pre-deploy
# checks (e.g., smoke tests) before releasing.
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'render.yaml'

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Pre-deploy DB health and reconciliation gate
        env:
          DJANGO_ENV: production
          DEBUG: 'False'
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
          DATABASE_POOL_URL: ${{ secrets.RENDER_DATABASE_POOL_URL }}
          REDIS_URL: ${{ secrets.RENDER_REDIS_URL }}
          OPS_ALERT_WEBHOOK_URL: ''
        run: python release_gate.py --mode deploy

      - name: Call Render deploy hook
        # Add RENDER_DEPLOY_HOOK_URL as a repository secret in GitHub:
        #   Settings → Secrets and variables → Actions → New repository secret
        # Required pre-deploy gate secrets:
        #   DJANGO_SECRET_KEY
        #   DJANGO_ALLOWED_HOSTS
        #   DJANGO_CSRF_TRUSTED_ORIGINS
        #   RENDER_DATABASE_URL
        #   RENDER_DATABASE_POOL_URL
        #   RENDER_REDIS_URL
        # Get the URL from: Render Dashboard → step2win-backend → Settings → Deploy Hook
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy hook triggered successfully."
