components:
  schemas:
    AdminBadge:
      type: object
      description: Admin serializer for badge data
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          description: Emoji or icon name
          maxLength: 10
        badge_type:
          allOf:
          - $ref: '#/components/schemas/BadgeTypeEnum'
          default: achievement
        color:
          type: string
          default: '#00F5E9'
          description: Hex color code
          maxLength: 7
        criteria_type:
          allOf:
          - $ref: '#/components/schemas/CriteriaTypeEnum'
          default: manual
        criteria_value:
          type: integer
          nullable: true
          description: Threshold value for criteria
        users_earned:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - description
      - icon
      - id
      - name
      - slug
      - users_earned
    AdminChallenge:
      type: object
      description: Admin serializer for challenge data
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/Status645Enum'
          default: pending
        creator:
          type: integer
        created_by_username:
          type: string
          readOnly: true
        entry_fee:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        total_pool:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          default: '0.00'
          description: Total prize pool (sum of all entry fees)
        platform_fee:
          type: string
          readOnly: true
        max_participants:
